<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igor Babler Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <span class="i-letter">I</span>

    <span class="igor-part">
      <span class="remove-letter">G</span>
      <span class="remove-letter">O</span>
      <span class="remove-letter">R</span>
    </span>

    <span class="surname">BABLER</span>
  </div>

  <nav>
    <a href="https://github.com/SEU_GITHUB" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/SEU_LINKEDIN" target="_blank">LinkedIn</a>
  </nav>
</header>

<section class="hero">

  <img
    id="sequence-frame"
    class="sequence-frame"
    src="assets/frames/Desktop/NotebookFrame-jpg/ezgif-frame-001.jpg"
    alt="Notebook Animation"
  >

  <div class="side-text left-text">
    <span class="data">Data</span>
    <span class="scientist">Scientist</span>
  </div>

  <!-- Grupo exclusivo do mobile -->
  <div class="mobile-d-group">

    <span class="creative-mobile">Creative</span>

    <div class="big-d-position">
        <span class="big-d-mobile">D</span>
    </div>

    <span class="developer-mobile">
        <span>DEVELOPER</span>
    </span>

    <span class="data-mobile">
        <span>DATA</span>
    </span>

    <span class="scientist-mobile">
        <span>SCIENTIST</span>
    </span>

</div>

  <!-- Desktop -->
  <div class="side-text right-text">
    <span class="big-d">
      <span class="big-d-text">D</span>
    </span>

    <div class="d-words">
      <span class="creative">Creative</span>
      <span class="developer-desktop">eveloper</span>
    </div>
  </div>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script src="script.js"></script>

</body>
</html>
